<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #4facfe, #00f2fe, #43e97b);
  background-size: 600% 600%;
  animation: gradientBG 10s ease infinite;
}

/* Background animation */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.login-box {
  background: rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  width: 300px;
  text-align: center;
  color: #fff;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2 {
  margin-bottom: 20px;
}

.input-box {
  margin: 15px 0;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border: none;
  outline: none;
  border-radius: 5px;
}

button {
  margin-top: 15px;
  padding: 10px;
  width: 100%;
  border: none;
  border-radius: 5px;
  background: #fff;
  color: #333;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ddd;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>
  <div class="input-box">
    <input type="text" placeholder="Username">
  </div>
  <div class="input-box">
    <input type="password" placeholder="Password">
  </div>
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  alert("Demo Login Clicked!");
}
</script>

</body>
</html>
